name: Artifacts (Package)

on: [push, pull_request, workflow_dispatch]

jobs:
  artifacts-mingw-w64:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      id: checkout-code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup problem matcher
      uses: Joshua-Ashton/gcc-problem-matcher@v3

    - name: Build release
      id: build-release
      uses: Joshua-Ashton/arch-mingw-github-action@v8
      with:
        command: |
          export VERSION_NAME="${GITHUB_REF##*/}-${GITHUB_SHA##*/}"
          ./package-release.sh ${VERSION_NAME} build --no-package
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

    - name: Upload artifacts
      id: upload-artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dxvk-win-${{ env.VERSION_NAME }}
        path: build/dxvk-${{ env.VERSION_NAME }}
        if-no-files-found: error

  artifacts-native-linux:
    runs-on: ubuntu-latest
    container: 
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:beta
      options: --user 1001

    steps:
    - name: Checkout code
      id: checkout-code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup problem matcher
      uses: Joshua-Ashton/gcc-problem-matcher@v3

    - name: Build native release
      id: build-native-release
      shell: bash
      run: |
        export VERSION_NAME="${GITHUB_REF##*/}-${GITHUB_SHA##*/}"
        mkdir -p build
        ./package-native.sh ${VERSION_NAME} build
        mv build/dxvk-native-${VERSION_NAME}.tar.gz build/dxvk-native-linux-${VERSION_NAME}.tar.gz
        echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

    - name: Upload native artifacts
      id: upload-native-artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dxvk-native-linux-${{ env.VERSION_NAME }}
        path: build/dxvk-native-linux-${{ env.VERSION_NAME }}.tar.gz
        if-no-files-found: error

  artifacts-native-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      id: checkout-code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install build dependencies
      shell: bash
      run: |
        brew update
        brew install meson ninja pkg-config cmake sdl2 sdl3 glfw glslang molten-vk

    - name: Setup problem matcher
      uses: Joshua-Ashton/gcc-problem-matcher@v3

    - name: Build native release
      id: build-native-release
      shell: bash
      run: |
        export VERSION_NAME="${GITHUB_REF##*/}-${GITHUB_SHA##*/}"
        mkdir -p build
        ./package-native.sh ${VERSION_NAME} build --64-only
        mv build/dxvk-native-${VERSION_NAME}.tar.gz build/dxvk-native-macos-${VERSION_NAME}.tar.gz
        echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

    - name: Upload native artifacts
      id: upload-native-artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dxvk-native-macos-${{ env.VERSION_NAME }}
        path: build/dxvk-native-macos-${{ env.VERSION_NAME }}.tar.gz
        if-no-files-found: error

  artifacts-native-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      id: checkout-code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          git
          make
          tar
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-meson
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-sdl3
          mingw-w64-x86_64-glfw
          mingw-w64-x86_64-glslang

    - name: Setup problem matcher
      uses: Joshua-Ashton/gcc-problem-matcher@v3

    - name: Build native release
      id: build-native-release
      shell: msys2 {0}
      run: |
        export VERSION_NAME="${GITHUB_REF##*/}-${GITHUB_SHA##*/}"
        mkdir -p build
        ./package-native.sh ${VERSION_NAME} build --64-only
        mv build/dxvk-native-${VERSION_NAME}.tar.gz build/dxvk-native-windows-${VERSION_NAME}.tar.gz
        echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

    - name: Upload native artifacts
      id: upload-native-artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dxvk-native-windows-${{ env.VERSION_NAME }}
        path: build/dxvk-native-windows-${{ env.VERSION_NAME }}.tar.gz
        if-no-files-found: error

  merge-artifacts:
    runs-on: ubuntu-latest
    needs: [artifacts-mingw-w64, artifacts-native-linux, artifacts-native-macos, artifacts-native-windows]
    steps:
      - name: Get version
        id: get-version
        shell: bash
        run: |
          echo "VERSION_NAME=${GITHUB_REF##*/}-${GITHUB_SHA##*/}" >> $GITHUB_ENV

      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: dxvk-${{ env.VERSION_NAME }}
          pattern: dxvk*
          delete-merged: true
